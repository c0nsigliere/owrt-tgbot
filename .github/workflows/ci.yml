name: CI
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ucode build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libjson-c-dev pkg-config

      - name: Build and install ucode
        run: |
          git clone --depth 1 https://github.com/jow-/ucode.git /tmp/ucode
          cd /tmp/ucode
          cmake -DUBUS_SUPPORT=OFF -DUCI_SUPPORT=OFF -DULOOP_SUPPORT=OFF .
          make -j$(nproc)
          sudo make install
          sudo ldconfig

      - name: Run tests
        run: ucode -S tests/run.uc
